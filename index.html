<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HeartLink</title>

<style>
body{
    margin:0;
    background:#f5f5f5;
    font-family:Arial,"Microsoft YaHei",sans-serif;
}

.phone{
    max-width:420px;
    height:100vh;
    margin:auto;
    background:white;
    display:flex;
    flex-direction:column;
}

.header{
    padding:18px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    border-bottom:1px solid #eee;
}

.search{
    margin:15px;
    padding:12px;
    background:#f2f2f2;
    border-radius:12px;
    color:#999;
}

.card{
    margin:10px 15px;
    padding:15px;
    border-radius:15px;
    background:#fff;
    box-shadow:0 2px 8px #ddd;
}

.name{
    font-size:18px;
    font-weight:bold;
}

.msg{
    margin-top:8px;
    color:#666;
}

.bottom{
    margin-top:auto;
    display:flex;
    justify-content:space-around;
    padding:15px;
    border-top:1px solid #eee;
}

button{
    border:0;
    background:none;
    font-size:16px;
}
</style>

</head>

<body>

<div class="phone">

<div class="header">
❤️ HeartLink
</div>


<div class="search">
🔍 搜索角色
</div>


<div class="card">

<div class="name">
❤️ 林晚
</div>

<div class="msg">
今天辛苦啦，回来了吗？
</div>

</div>



<div class="card">

<div class="name">
🌸 夏璃
</div>

<div class="msg">
晚上一起聊天吧～
</div>

</div>



<div class="card">

<div class="name">
➕ 创建新角色
</div>

</div>



<div class="bottom">

<button>
💬 聊天
</button>

<button>
❤️ 角色
</button>

<button>
⚙ 设置
</button>

</div>


</div>

</body>
</html>
