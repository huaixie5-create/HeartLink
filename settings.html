<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>HeartLink设置</title>

<style>

body{
font-family:"Microsoft YaHei";
background:#f5f5f5;
}

.box{
max-width:420px;
margin:auto;
background:white;
padding:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #ddd;
box-sizing:border-box;
}


button{

width:100%;
padding:12px;
background:#07c160;
color:white;
border:0;
border-radius:20px;

}

</style>

</head>


<body>


<div class="box">


<h2>⚙ HeartLink设置</h2>


<p>API地址</p>

<input id="api"
value="https://xn--vduyey89e.com/v1">


<p>模型名称</p>

<input id="model"
value="deepseek-v4-pro">


<p>API Key</p>

<input id="key"
placeholder="输入你的API Key">


<button onclick="save()">
保存设置
</button>


</div>



<script>

function save(){
function save(){

localStorage.setItem(
"api",
document.getElementById("api").value
);


localStorage.setItem(
"model",
document.getElementById("model").value
);


localStorage.setItem(
"key",
document.getElementById("key").value
);


alert("保存成功");

}



//打开页面自动读取

window.onload=function(){


let api=localStorage.getItem("api");

let model=localStorage.getItem("model");

let key=localStorage.getItem("key");



if(api){

document.getElementById("api").value=api;

}


if(model){

document.getElementById("model").value=model;

}


if(key){

document.getElementById("key").value=key;

}


}

</script>


</body>

</html>
